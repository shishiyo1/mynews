<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News Wire</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Noto+Sans+JP:wght@400;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100%;
      background: linear-gradient(160deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
      color: #fff; font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
    }
    body { overflow-x: hidden; }
    button, input, select { font: inherit; }
    a { color: inherit; }
    .hidden { display: none !important; }

    .screen {
      min-height: 100svh;
      position: relative;
      --topChromeHeight: 172px;
      --bottomBarHeight: 34px;
      --sectionGap: 130px;
    }

    .top-chrome {
      position: sticky;
      top: 0;
      z-index: 5;
      background: linear-gradient(180deg, rgba(13,17,23,0.98) 0%, rgba(13,17,23,0.96) 80%, rgba(13,17,23,0.86) 100%);
      backdrop-filter: blur(10px);
      transition: transform 0.28s ease, opacity 0.28s ease, max-height 0.28s ease;
      transform: translateY(0);
      opacity: 1;
      overflow: hidden;
      max-height: 400px;
    }

    .top-reveal-hint {
      position: fixed;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 6;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(13,17,23,0.75);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .content-area {
      padding-top: 0;
      padding-bottom: calc(var(--bottomBarHeight, 34px) + 10px);
      min-height: calc(100svh - var(--topChromeHeight, 172px));
      transition: min-height 0.28s ease;
    }

    #mainScreen.ui-collapsed.vertical-mode .top-chrome {
      transform: translateY(calc(-1 * var(--topChromeHeight, 172px)));
      opacity: 0.01;
      pointer-events: none;
      max-height: 0;
    }
    #mainScreen.ui-collapsed.vertical-mode .top-reveal-hint { opacity: 1; }
    #mainScreen.ui-collapsed.vertical-mode .content-area {
      min-height: calc(100svh - var(--bottomBarHeight, 34px));
    }

    .header {
      padding: 16px 20px 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 2;
    }
    .header-right { margin-left: auto; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .control-select, .main-tools-btn {
      padding: 7px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.82);
      font-size: 12px;
      outline: none;
      cursor: pointer;
    }
    .chip-row { padding: 12px 20px 6px; display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .chip {
      flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.45); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .chip.active { border-color: rgba(0,255,180,0.3); background: rgba(0,255,180,0.1); color: #00ffb4; }
    .error {
      margin: 12px 20px; padding: 12px 16px; border-radius: 10px;
      background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2);
      color: #ff8a8a; font-size: 12px; line-height: 1.6;
    }

    .glow1, .glow2 { position: fixed; border-radius: 50%; pointer-events: none; }
    .glow1 { top: -200px; right: -200px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,255,180,0.04) 0%, transparent 70%); }
    .glow2 { bottom: -200px; left: -200px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(100,140,255,0.03) 0%, transparent 70%); }

    .section-label { display: flex; align-items: center; gap: 8px; padding: 0 24px; margin-bottom: 4px; flex-wrap: wrap; }
    .section-name { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
    .section-meta { font-size: 10px; color: rgba(255,255,255,0.28); }

    .ticker-wrap { overflow: hidden; width: 100%; position: relative; padding: 4px 0; }
    .ticker-track { display: flex; gap: 16px; white-space: nowrap; will-change: transform; }

    .list-wrap {
      padding: 4px 20px 0;
      height: calc((100svh - var(--topChromeHeight, 172px) - var(--bottomBarHeight, 34px) - var(--sectionGap, 130px)) / 2);
      min-height: 220px; overflow: hidden; position: relative;
    }
    .list-column { display: flex; flex-direction: column; gap: 12px; will-change: transform; }
    .list-column .news-card { width: 100%; max-width: none; min-width: 0; }

    .news-card {
      flex-shrink: 0; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 12px 16px; max-width: 380px; min-width: 280px;
      cursor: pointer; text-align: left; transition: all 0.25s ease; position: relative;
    }
    .news-card:hover {
      background: rgba(255,255,255,0.08); border-color: rgba(0,255,180,0.3);
      transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,255,180,0.08);
    }
    .index-badge {
      display: inline-flex; align-items: center; justify-content: center; min-width: 44px;
      padding: 2px 8px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7); font-size: 10px; font-weight: 700;
      margin-bottom: 8px;
    }
    .news-title {
      font-size: 13px; font-weight: 700; color: #e0ffe8; white-space: normal; line-height: 1.45;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      font-family: 'Noto Sans JP', 'DM Sans', sans-serif;
    }
    .news-desc {
      font-size: 11px; color: rgba(255,255,255,0.58); margin-top: 7px; line-height: 1.5; white-space: normal;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .news-meta { font-size: 11px; color: rgba(255,255,255,0.38); margin-top: 7px; }
    .divider { margin: 12px 24px; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent); }
    .loading { text-align: center; padding: 30px 20px; color: rgba(255,255,255,0.25); font-size: 13px; }
    .spinner { width: 20px; height: 20px; border: 2px solid rgba(0,255,180,0.15); border-top-color: #00ffb4; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
    .spinner.blue { border-color: rgba(100,140,255,0.15); border-top-color: #648cff; }

    .statusbar {
      position: fixed; bottom: 0; left: 0; right: 0; padding: 8px 20px;
      background: linear-gradient(transparent, #0d1117 40%); display: flex; justify-content: space-between;
      align-items: center; font-size: 10px; color: rgba(255,255,255,0.22); flex-wrap: wrap; gap: 4px; z-index: 3;
    }

    .modal {
      position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.75); backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.2s ease;
    }
    .modal-card {
      background: linear-gradient(160deg, #1a1f2e 0%, #0d1117 100%); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; max-width: 600px; width: 100%; max-height: 82vh; overflow: auto; padding: 32px;
      position: relative; box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .close-btn {
      position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.08); border: none;
      border-radius: 50%; width: 32px; height: 32px; color: #fff; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-img { width: 100%; border-radius: 10px; margin-bottom: 20px; max-height: 240px; object-fit: cover; }
    .modal-title { font-size: 20px; font-weight: 700; color: #e0ffe8; line-height: 1.4; margin: 0 0 12px; }
    .modal-desc { font-size: 14px; color: rgba(255,255,255,0.65); line-height: 1.7; margin-bottom: 16px; white-space: pre-wrap; }
    .modal-footer { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .article-link {
      background: linear-gradient(135deg, #00ffb4, #00d4aa); color: #0d1117; padding: 8px 20px;
      border-radius: 8px; font-size: 13px; font-weight: 700; text-decoration: none;
    }

    .provider-badge {
      font-size: 10px; padding: 3px 8px; border-radius: 999px; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.55);
    }

    input[type="range"] { accent-color: #00ffb4; }
    ::-webkit-scrollbar { height: 0; width: 0; }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes spin { to { transform: rotate(360deg) } }
  </style>
</head>
<body>
  <div id="mainScreen" class="screen">
    <div class="glow1"></div>
    <div class="glow2"></div>

    <div id="topRevealHint" class="top-reveal-hint">ヘッダー再表示: 画面上端にカーソルを移動</div>
    <div id="topChrome" class="top-chrome">
      <header class="header">
        <div style="display:flex; align-items:center; gap:8px;">
          <span style="font-size:20px;">⚡</span>
          <h1 style="font-family:'Space Mono', monospace; font-size:17px; color:#00ffb4; letter-spacing:-0.5px; margin:0;">NEWS WIRE</h1>
        </div>
        <div class="header-right">
          <label style="display:flex; align-items:center; gap:6px; background:rgba(255,255,255,0.04); border-radius:8px; border:1px solid rgba(255,255,255,0.08); padding:4px 8px;">
            <span style="font-size:11px; color:rgba(255,255,255,0.45)">表示</span>
            <select id="viewModeSelect" class="control-select">
              <option value="horizontal" selected>横スクロール</option>
              <option value="vertical">縦スクロール</option>
            </select>
          </label>
          <label style="display:flex; align-items:center; gap:6px; background:rgba(255,255,255,0.04); border-radius:8px; border:1px solid rgba(255,255,255,0.08); padding:4px 8px;">
            <span style="font-size:11px; color:rgba(255,255,255,0.45)">件数</span>
            <select id="maxResultsMain" class="control-select">
              <option value="10" selected>10</option>
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </label>
          <div id="speedControl" style="display:flex; align-items:center; gap:4px; background:rgba(255,255,255,0.04); border-radius:8px; border:1px solid rgba(255,255,255,0.08); padding:4px 10px;">
            <span style="font-size:10px; color:rgba(255,255,255,0.35)">🐢</span>
            <input id="speedRange" type="range" min="15" max="120" value="50" style="width:50px;">
            <span style="font-size:10px; color:rgba(255,255,255,0.35)">🐇</span>
          </div>
          <button id="toggleHeaderBtn" class="main-tools-btn" type="button">ヘッダー非表示</button>
          <span class="provider-badge">data/news.json</span>
          <button id="refreshBtn" class="main-tools-btn" type="button">再読込</button>
        </div>
      </header>

      <div id="chipRow" class="chip-row"></div>
      <div id="errorBox" class="error hidden"></div>
    </div>

    <div id="contentArea" class="content-area">
      <div style="margin-top:12px;">
        <div class="section-label">
          <span style="font-size:14px;">🇯🇵</span>
          <span class="section-name" style="color:#00ffb4;">Japan</span>
          <span id="jpCount" class="section-meta"></span>
        </div>
        <div id="jpLoading" class="loading"><div class="spinner"></div>日本のニュースを読み込み中…</div>
        <div id="jpTicker" class="ticker-wrap hidden"><div id="jpTrack" class="ticker-track"></div></div>
        <div id="jpList" class="list-wrap hidden"><div id="jpListColumn" class="list-column"></div></div>
      </div>

      <div class="divider"></div>

      <div>
        <div class="section-label">
          <span style="font-size:14px;">🌍</span>
          <span class="section-name" style="color:#648cff;">World</span>
          <span id="worldCount" class="section-meta"></span>
        </div>
        <div id="worldLoading" class="loading"><div class="spinner blue"></div>海外ニュースを読み込み中…</div>
        <div id="worldTicker" class="ticker-wrap hidden"><div id="worldTrack" class="ticker-track"></div></div>
        <div id="worldList" class="list-wrap hidden"><div id="worldListColumn" class="list-column"></div></div>
      </div>

      <div class="statusbar">
        <span id="statusCount">🇯🇵 0件 · 🌍 0件</span>
        <span id="statusTime">更新: --</span>
        <span>GitHub Pages 静的配信</span>
      </div>
    </div>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-card" id="modalCard">
      <button id="closeModal" class="close-btn">✕</button>
      <img id="modalImg" class="modal-img hidden" alt="">
      <div id="modalIndex" class="index-badge" style="margin-bottom: 14px;"></div>
      <h2 id="modalTitle" class="modal-title"></h2>
      <p id="modalDesc" class="modal-desc"></p>
      <div class="modal-footer">
        <span id="modalMeta" style="font-size:12px; color:rgba(255,255,255,0.35);"></span>
        <a id="modalLink" class="article-link" href="#" target="_blank" rel="noopener noreferrer">元記事を読む →</a>
      </div>
    </div>
  </div>

  <script>
    const DEFAULT_CATEGORIES = [
      { id: 'general', label: '総合' },
      { id: 'technology', label: 'テクノロジー' },
      { id: 'business', label: 'ビジネス' },
      { id: 'entertainment', label: 'エンタメ' },
      { id: 'sports', label: 'スポーツ' },
      { id: 'science', label: 'サイエンス' },
    ];

    const state = {
      category: 'general',
      availableCategories: DEFAULT_CATEGORIES.slice(),
      japanArticles: [],
      worldArticles: [],
      maxResults: 10,
      speed: 50,
      viewMode: 'horizontal',
      selected: null,
      rawData: null,
      uiCollapsed: false,
      uiHideTimer: null,
      lastUpdated: null,
    };

    const animators = [];
    const $ = (id) => document.getElementById(id);

    function saveConfig() {
      localStorage.setItem('newswire-static-config', JSON.stringify({
        maxResults: state.maxResults,
        viewMode: state.viewMode,
        speed: state.speed,
        category: state.category
      }));
    }

    function loadConfig() {
      try {
        const raw = localStorage.getItem('newswire-static-config');
        if (!raw) return;
        const conf = JSON.parse(raw);
        if ([10, 25, 50, 100].includes(Number(conf.maxResults))) state.maxResults = Number(conf.maxResults);
        if (conf.viewMode === 'horizontal' || conf.viewMode === 'vertical') state.viewMode = conf.viewMode;
        if (typeof conf.speed === 'number') state.speed = conf.speed;
        if (typeof conf.category === 'string') state.category = conf.category;
      } catch (_) {}
    }

    function setError(message) {
      const box = $('errorBox');
      box.textContent = message || '';
      box.classList.toggle('hidden', !message);
    }

    function toDisplayTime(iso) {
      if (!iso) return '';
      const dt = new Date(iso);
      if (Number.isNaN(dt.getTime())) return '';
      return dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function toDisplayDateTime(iso) {
      if (!iso) return '';
      const dt = new Date(iso);
      if (Number.isNaN(dt.getTime())) return '';
      return dt.toLocaleString();
    }

    function normalizeArticle(article, index, total, region) {
      return {
        title: article.title || article.headline || '無題',
        description: article.description || article.summary || '',
        url: article.url || '#',
        source: { name: article.source?.name || article.source || 'News' },
        publishedAt: article.publishedAt || article.published_at || article.date || '',
        image: article.image || article.imageUrl || null,
        index,
        total,
        region
      };
    }

    function extractCategoryMap(payload) {
      if (payload && payload.categories && typeof payload.categories === 'object') {
        return payload.categories;
      }
      const fallback = {};
      fallback.general = {
        jp: payload?.japan || payload?.jp || [],
        world: payload?.world || payload?.global || []
      };
      return fallback;
    }

    function getAvailableCategories(map) {
      const ids = Object.keys(map || {});
      if (!ids.length) return DEFAULT_CATEGORIES.slice(0, 1);
      return ids.map((id) => {
        const found = DEFAULT_CATEGORIES.find((c) => c.id === id);
        return found || { id, label: id };
      });
    }

    function selectArticles(categoryId) {
      const categoryMap = extractCategoryMap(state.rawData);
      const group = categoryMap[categoryId] || categoryMap.general || { jp: [], world: [] };
      const jpRaw = Array.isArray(group.jp) ? group.jp : [];
      const worldRaw = Array.isArray(group.world) ? group.world : [];
      const jp = jpRaw.slice(0, state.maxResults).map((a, i) => normalizeArticle(a, i + 1, Math.min(jpRaw.length, state.maxResults), 'japan'));
      const world = worldRaw.slice(0, state.maxResults).map((a, i) => normalizeArticle(a, i + 1, Math.min(worldRaw.length, state.maxResults), 'world'));
      state.japanArticles = jp;
      state.worldArticles = world;
    }

    function renderCategoryChips() {
      const row = $('chipRow');
      row.innerHTML = '';
      state.availableCategories.forEach((cat) => {
        const btn = document.createElement('button');
        btn.className = `chip ${state.category === cat.id ? 'active' : ''}`;
        btn.textContent = cat.label;
        btn.addEventListener('click', () => {
          if (state.category === cat.id) return;
          state.category = cat.id;
          saveConfig();
          renderData();
        });
        row.appendChild(btn);
      });
    }

    function updateTopChromeHeight() {
      const main = $('mainScreen');
      const topChrome = $('topChrome');
      if (!main || !topChrome) return;
      const effectiveHeight = state.uiCollapsed && state.viewMode === 'vertical'
        ? 0
        : Math.max(0, Math.ceil(topChrome.getBoundingClientRect().height || topChrome.offsetHeight || 0));
      main.style.setProperty('--topChromeHeight', `${effectiveHeight}px`);
      const statusbar = document.querySelector('.statusbar');
      if (statusbar) {
        const statusHeight = Math.max(0, Math.ceil(statusbar.getBoundingClientRect().height || statusbar.offsetHeight || 0));
        if (statusHeight > 0) main.style.setProperty('--bottomBarHeight', `${statusHeight}px`);
      }
    }

    function setUICollapsed(collapsed) {
      state.uiCollapsed = !!collapsed;
      const main = $('mainScreen');
      main.classList.toggle('ui-collapsed', state.uiCollapsed && state.viewMode === 'vertical');
      $('toggleHeaderBtn').textContent = state.uiCollapsed && state.viewMode === 'vertical' ? 'ヘッダー表示' : 'ヘッダー非表示';
      requestAnimationFrame(updateTopChromeHeight);
    }

    function clearUIHideTimer() {
      if (state.uiHideTimer) {
        clearTimeout(state.uiHideTimer);
        state.uiHideTimer = null;
      }
    }

    function scheduleVerticalUICollapse(delay = 2600) {
      clearUIHideTimer();
      if (state.viewMode !== 'vertical') {
        setUICollapsed(false);
        return;
      }
      state.uiHideTimer = setTimeout(() => setUICollapsed(true), delay);
    }

    function revealVerticalUI() {
      if (state.viewMode !== 'vertical') return;
      setUICollapsed(false);
      scheduleVerticalUICollapse();
    }

    function createNewsCard(article) {
      const btn = document.createElement('button');
      btn.className = 'news-card';
      btn.type = 'button';

      const index = document.createElement('div');
      index.className = 'index-badge';
      index.textContent = `${article.index}/${article.total}`;

      const title = document.createElement('div');
      title.className = 'news-title';
      title.textContent = article.title || '無題';

      const desc = document.createElement('div');
      desc.className = 'news-desc';
      desc.textContent = article.description || '';

      const meta = document.createElement('div');
      meta.className = 'news-meta';
      meta.textContent = `${article.source?.name || 'News'}${article.publishedAt ? ` · ${toDisplayTime(article.publishedAt)}` : ''}`;

      btn.append(index, title, desc, meta);
      btn.addEventListener('click', () => openModal(article));
      return btn;
    }

    function mountSection(region, articles) {
      const ticker = region === 'japan' ? $('jpTicker') : $('worldTicker');
      const track = region === 'japan' ? $('jpTrack') : $('worldTrack');
      const list = region === 'japan' ? $('jpList') : $('worldList');
      const listColumn = region === 'japan' ? $('jpListColumn') : $('worldListColumn');
      const countEl = region === 'japan' ? $('jpCount') : $('worldCount');
      const loadingEl = region === 'japan' ? $('jpLoading') : $('worldLoading');

      loadingEl.classList.add('hidden');
      track.innerHTML = '';
      listColumn.innerHTML = '';

      if (!articles.length) {
        ticker.classList.add('hidden');
        list.classList.add('hidden');
        countEl.textContent = '0件';
        return;
      }

      countEl.textContent = `${articles.length}件`;
      const doubled = [...articles, ...articles];
      doubled.forEach((article) => track.appendChild(createNewsCard(article)));
      doubled.forEach((article) => listColumn.appendChild(createNewsCard(article)));
      track.dataset.speedFactor = region === 'japan' ? '1' : '0.8';
      listColumn.dataset.speedFactor = region === 'japan' ? '0.7' : '0.56';
    }

    function stopAnimators() {
      animators.forEach((item) => {
        item.active = false;
        if (item.rafId) cancelAnimationFrame(item.rafId);
        if (item.element) item.element.style.transform = item.axis === 'y' ? 'translateY(0px)' : 'translateX(0px)';
      });
      animators.length = 0;
    }

    function resetTickerAnimator(track) {
      const stateAnim = { element: track, active: true, offset: 0, lastTs: null, paused: false, rafId: null, axis: 'x' };
      const wrap = track.parentElement;
      wrap.onmouseenter = () => { stateAnim.paused = true; };
      wrap.onmouseleave = () => { stateAnim.paused = false; };
      wrap.ontouchstart = () => { stateAnim.paused = true; };
      wrap.ontouchend = () => { setTimeout(() => { stateAnim.paused = false; }, 1500); };

      const step = (ts) => {
        if (!stateAnim.active) return;
        if (stateAnim.lastTs === null) stateAnim.lastTs = ts;
        const dt = ts - stateAnim.lastTs;
        stateAnim.lastTs = ts;
        if (!stateAnim.paused) {
          const speedFactor = Number(track.dataset.speedFactor || '1');
          const width = track.scrollWidth / 2;
          if (width > 0) {
            stateAnim.offset -= (state.speed * speedFactor * dt) / 1000;
            if (stateAnim.offset <= -width) stateAnim.offset = 0;
            track.style.transform = `translateX(${stateAnim.offset}px)`;
          }
        }
        stateAnim.rafId = requestAnimationFrame(step);
      };
      animators.push(stateAnim);
      stateAnim.rafId = requestAnimationFrame(step);
    }

    function resetVerticalAnimator(listColumn) {
      const stateAnim = { element: listColumn, active: true, offset: 0, lastTs: null, paused: false, rafId: null, axis: 'y' };
      const wrap = listColumn.parentElement;
      wrap.onmouseenter = () => { stateAnim.paused = true; };
      wrap.onmouseleave = () => { stateAnim.paused = false; };
      wrap.ontouchstart = () => { stateAnim.paused = true; };
      wrap.ontouchend = () => { setTimeout(() => { stateAnim.paused = false; }, 1500); };

      const step = (ts) => {
        if (!stateAnim.active) return;
        if (stateAnim.lastTs === null) stateAnim.lastTs = ts;
        const dt = ts - stateAnim.lastTs;
        stateAnim.lastTs = ts;
        if (!stateAnim.paused) {
          const height = listColumn.scrollHeight / 2;
          if (height > 0) {
            const speedFactor = Number(listColumn.dataset.speedFactor || '0.7');
            stateAnim.offset -= (state.speed * speedFactor * dt) / 1000;
            if (stateAnim.offset <= -height) stateAnim.offset = 0;
            listColumn.style.transform = `translateY(${stateAnim.offset}px)`;
          }
        }
        stateAnim.rafId = requestAnimationFrame(step);
      };
      animators.push(stateAnim);
      stateAnim.rafId = requestAnimationFrame(step);
    }

    function applyViewMode() {
      const horizontal = state.viewMode === 'horizontal';
      $('viewModeSelect').value = state.viewMode;
      $('mainScreen').classList.toggle('vertical-mode', !horizontal);
      const sections = [
        { ticker: $('jpTicker'), list: $('jpList'), hasItems: state.japanArticles.length > 0 },
        { ticker: $('worldTicker'), list: $('worldList'), hasItems: state.worldArticles.length > 0 }
      ];
      sections.forEach(({ ticker, list, hasItems }) => {
        if (!hasItems) {
          ticker.classList.add('hidden');
          list.classList.add('hidden');
          return;
        }
        ticker.classList.toggle('hidden', !horizontal);
        list.classList.toggle('hidden', horizontal);
      });

      stopAnimators();
      if (horizontal) {
        setUICollapsed(false);
        clearUIHideTimer();
        if (state.japanArticles.length) resetTickerAnimator($('jpTrack'));
        if (state.worldArticles.length) resetTickerAnimator($('worldTrack'));
      } else {
        setUICollapsed(false);
        if (state.japanArticles.length) resetVerticalAnimator($('jpListColumn'));
        if (state.worldArticles.length) resetVerticalAnimator($('worldListColumn'));
        scheduleVerticalUICollapse(3200);
      }
      requestAnimationFrame(updateTopChromeHeight);
    }

    function openModal(article) {
      $('modalIndex').textContent = `${article.index}/${article.total}`;
      $('modalTitle').textContent = article.title || '';
      $('modalDesc').textContent = article.description || '';
      $('modalMeta').textContent = `${article.source?.name || 'News'}${article.publishedAt ? ` · ${toDisplayDateTime(article.publishedAt)}` : ''}`;
      $('modalLink').href = article.url || '#';
      const img = $('modalImg');
      if (article.image) {
        img.src = article.image;
        img.classList.remove('hidden');
      } else {
        img.src = '';
        img.classList.add('hidden');
      }
      $('modal').classList.remove('hidden');
    }

    function closeModal() { $('modal').classList.add('hidden'); }

    function updateStatusBar() {
      $('statusCount').textContent = `🇯🇵 ${state.japanArticles.length}件 · 🌍 ${state.worldArticles.length}件`;
      const updated = state.lastUpdated ? toDisplayDateTime(state.lastUpdated) : '--';
      $('statusTime').textContent = `更新: ${updated}`;
    }

    function renderData() {
      selectArticles(state.category);
      renderCategoryChips();
      mountSection('japan', state.japanArticles);
      mountSection('world', state.worldArticles);
      updateStatusBar();
      applyViewMode();
      requestAnimationFrame(updateTopChromeHeight);
    }

    async function loadNewsData() {
      setError('');
      $('jpLoading').classList.remove('hidden');
      $('worldLoading').classList.remove('hidden');
      try {
        const res = await fetch(`data/news.json?t=${Date.now()}`, { cache: 'no-store' });
        if (!res.ok) throw new Error(`news.json の取得に失敗 (${res.status})`);
        const data = await res.json();
        state.rawData = data;
        state.availableCategories = getAvailableCategories(extractCategoryMap(data));
        if (!state.availableCategories.some((c) => c.id === state.category)) {
          state.category = state.availableCategories[0]?.id || 'general';
        }
        state.lastUpdated = data.updatedAt || data.generatedAt || data.lastUpdated || new Date().toISOString();
        renderData();
      } catch (err) {
        $('jpLoading').classList.add('hidden');
        $('worldLoading').classList.add('hidden');
        setError(err?.message || 'data/news.json の読み込みに失敗しました。');
      }
    }

    function bindEvents() {
      $('refreshBtn').addEventListener('click', loadNewsData);
      $('speedRange').addEventListener('input', (e) => {
        state.speed = Number(e.target.value);
        saveConfig();
      });
      $('viewModeSelect').addEventListener('change', (e) => {
        state.viewMode = e.target.value === 'vertical' ? 'vertical' : 'horizontal';
        saveConfig();
        applyViewMode();
      });
      $('maxResultsMain').addEventListener('change', (e) => {
        state.maxResults = Number(e.target.value || '10');
        saveConfig();
        renderData();
      });
      $('toggleHeaderBtn').addEventListener('click', () => {
        if (state.viewMode !== 'vertical') {
          state.viewMode = 'vertical';
          $('viewModeSelect').value = 'vertical';
          saveConfig();
          applyViewMode();
        }
        const nextCollapsed = !state.uiCollapsed;
        setUICollapsed(nextCollapsed);
        if (!nextCollapsed) scheduleVerticalUICollapse(4000);
        else clearUIHideTimer();
      });
      $('topChrome').addEventListener('mousemove', revealVerticalUI);
      $('topChrome').addEventListener('mouseenter', revealVerticalUI);
      $('topChrome').addEventListener('touchstart', revealVerticalUI, { passive: true });
      document.addEventListener('mousemove', (e) => {
        if (state.viewMode === 'vertical' && e.clientY <= 96) revealVerticalUI();
      });
      document.addEventListener('touchstart', (e) => {
        const touch = e.touches && e.touches[0];
        if (state.viewMode === 'vertical' && touch && touch.clientY <= 96) revealVerticalUI();
      }, { passive: true });
      $('closeModal').addEventListener('click', closeModal);
      $('modal').addEventListener('click', (e) => {
        if (e.target === $('modal')) closeModal();
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeModal();
      });
      window.addEventListener('resize', () => requestAnimationFrame(updateTopChromeHeight));
      window.addEventListener('orientationchange', () => requestAnimationFrame(updateTopChromeHeight));
      window.addEventListener('beforeunload', () => {
        stopAnimators();
        clearUIHideTimer();
      });
    }

    loadConfig();
    $('maxResultsMain').value = String(state.maxResults);
    $('viewModeSelect').value = state.viewMode;
    $('speedRange').value = String(state.speed);
    bindEvents();
    loadNewsData();
    requestAnimationFrame(updateTopChromeHeight);
  </script>
</body>
</html>
